<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <!-- void sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="55%" stop-color="#101018"/>
      <stop offset="100%" stop-color="#1c1c24"/>
    </linearGradient>
    <!-- crimson moon glow -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#b91c1c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonBody" cx="38%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="60%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <!-- fog gradients -->
    <linearGradient id="fogA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52525b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#52525b" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="fogB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#71717a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#71717a" stop-opacity="0.75"/>
    </linearGradient>

    <style>
      .fog-slow  { animation: driftL 46s linear infinite; }
      .fog-mid   { animation: driftR 30s linear infinite; }
      .fog-fast  { animation: driftL 20s linear infinite; }
      .moon      { animation: pulse 6s ease-in-out infinite; transform-origin: 500px 118px; }
      .halo      { animation: breathe 6s ease-in-out infinite; transform-origin: 500px 118px; }
      .star      { animation: twinkle 4s ease-in-out infinite; }
      .s2 { animation-delay: 1.1s; } .s3 { animation-delay: 2.3s; }
      .s4 { animation-delay: 0.6s; } .s5 { animation-delay: 3.1s; }
      .spirit    { animation: floatUp 9s ease-in-out infinite; }
      .sp2 { animation-delay: 3s; } .sp3 { animation-delay: 6s; }
      .title     { animation: reveal 3s ease-out forwards; opacity: 0; }
      .subtitle  { animation: reveal 3s ease-out 1.2s forwards; opacity: 0; }

      @keyframes driftL  { from { transform: translateX(0); } to { transform: translateX(-500px); } }
      @keyframes driftR  { from { transform: translateX(-500px); } to { transform: translateX(0); } }
      @keyframes pulse   { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
      @keyframes breathe { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
      @keyframes twinkle { 0%,100% { opacity: 0.15; } 50% { opacity: 0.9; } }
      @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; }
                           20% { opacity: 0.7; } 80% { opacity: 0.4; }
                           100% { transform: translateY(-70px); opacity: 0; } }
      @keyframes reveal  { from { opacity: 0; letter-spacing: 14px; }
                           to   { opacity: 1; letter-spacing: 6px; } }
      @media (prefers-reduced-motion: reduce) {
        .fog-slow, .fog-mid, .fog-fast, .moon, .halo, .star, .spirit { animation: none; }
        .title, .subtitle { animation: none; opacity: 1; }
      }
    </style>
  </defs>

  <!-- sky -->
  <rect width="1000" height="300" fill="url(#sky)"/>

  <!-- stars -->
  <circle class="star"    cx="120" cy="52"  r="1.6" fill="#d4d4d8"/>
  <circle class="star s2" cx="255" cy="90"  r="1.2" fill="#a1a1aa"/>
  <circle class="star s3" cx="760" cy="44"  r="1.7" fill="#d4d4d8"/>
  <circle class="star s4" cx="880" cy="105" r="1.3" fill="#a1a1aa"/>
  <circle class="star s5" cx="640" cy="70"  r="1.1" fill="#c9a227"/>
  <circle class="star s3" cx="345" cy="38"  r="1.2" fill="#c9a227"/>

  <!-- crimson moon -->
  <circle class="halo" cx="500" cy="118" r="95" fill="url(#moonGlow)"/>
  <circle class="moon" cx="500" cy="118" r="46" fill="url(#moonBody)"/>
  <circle cx="486" cy="104" r="7"  fill="#7f1d1d" opacity="0.5"/>
  <circle cx="512" cy="128" r="10" fill="#7f1d1d" opacity="0.4"/>
  <circle cx="498" cy="140" r="5"  fill="#7f1d1d" opacity="0.45"/>

  <!-- spirit wisps rising through the fog -->
  <circle class="spirit"     cx="300" cy="235" r="2.4" fill="#c9a227"/>
  <circle class="spirit sp2" cx="700" cy="245" r="2.0" fill="#c9a227"/>
  <circle class="spirit sp3" cx="510" cy="250" r="1.7" fill="#d4d4d8"/>

  <!-- title above the fog -->
  <text class="title" x="500" y="122" text-anchor="middle"
        font-size="40" font-weight="bold" fill="#e4e4e7"
        style="paint-order: stroke; stroke: #0a0a0f; stroke-width: 6px;">A W A D U L</text>
  <text class="subtitle" x="500" y="152" text-anchor="middle"
        font-size="15" fill="#c9a227" letter-spacing="3">ABOVE THE GRAY FOG</text>

  <!-- fog layers: each path is 1500 wide and loops on a 500px period -->
  <g class="fog-slow" opacity="0.6">
    <path fill="url(#fogA)" d="M0,220 Q60,196 125,214 T250,210 T375,222 T500,206 T625,218 T750,204 T875,220 T1000,208 T1125,222 T1250,206 T1375,218 T1500,210 L1500,300 L0,300 Z"/>
  </g>
  <g class="fog-mid" opacity="0.75">
    <path fill="url(#fogB)" d="M0,244 Q70,224 125,240 T250,236 T375,248 T500,232 T625,246 T750,230 T875,244 T1000,234 T1125,248 T1250,232 T1375,244 T1500,238 L1500,300 L0,300 Z"/>
  </g>
  <g class="fog-fast" opacity="0.9">
    <path fill="#27272a" d="M0,268 Q65,252 125,264 T250,262 T375,272 T500,258 T625,270 T750,256 T875,268 T1000,260 T1125,272 T1250,258 T1375,268 T1500,262 L1500,300 L0,300 Z"/>
  </g>
</svg>
